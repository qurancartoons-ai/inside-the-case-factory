[app]
name = "Inside the Case Factory"
environment = "production"
human_review_required = false

[paths]
projects_dir = "projects"
default_project = "example_case"

[video]
width = 1920
height = 1080
fps = 24
style = "cinematic documentary"

[pipeline]
default_content_mode = "factual_documentary"
allow_paid_providers = true
require_paid_api_confirmation = false
owner_automatic_approval = true
allow_publish = false
stop_before_expensive_steps = true
default_project_budget_usd = 0.25
dry_run = false
director_quality_threshold = 80.0
director_max_renders = 2
director_rerender_budget_usd = 0.0
director_estimated_rerender_cost_usd = 0.0

[review_gates]
after_research = false
after_script = false
after_scene_plan = false
before_generation = false
before_render = false
before_publish = true

[script]
words_per_minute = 125
duration_tolerance = 1.0
minimum_story_beat_coverage = 1.0
maximum_revision_attempts = 2
